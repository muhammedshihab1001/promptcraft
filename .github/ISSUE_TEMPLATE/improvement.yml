type: issue
name: Improvement
description: Suggest an improvement to an existing profile
title: "[IMPROVE] "
labels:
  - improvement

body:
  - type: input
    attributes:
      label: Which profile?
      placeholder: "e.g. profiles/developer/backend.md"
    validations:
      required: true

  - type: textarea
    attributes:
      label: What should change?
      placeholder: "Be specific."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Why is this better?
      placeholder: "Explain the improvement."
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Which AI did you observe this with?
      options:
        - label: Claude
        - label: ChatGPT
        - label: Gemini
        - label: Mistral
        - label: Llama
        - label: Other
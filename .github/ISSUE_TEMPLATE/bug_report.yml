type: issue
name: Bug report / Incorrect content
description: Something in a profile is wrong or broken
title: "[FIX] "
labels: ["fix"]

body:
  - type: input
    attributes:
      label: Which profile is affected?
      placeholder: "e.g. profiles/developer/backend.md"
    validations:
      required: true

  - type: textarea
    attributes:
      label: What is wrong?
      placeholder: "Be specific. Quote the line if possible."
    validations:
      required: true

  - type: textarea
    attributes:
      label: What should it say instead?
      placeholder: "Paste the corrected version here."
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Which AI did you observe this with?
      description: "Check all that apply."
      options:
        - label: Claude
        - label: ChatGPT
        - label: Gemini
        - label: Mistral
        - label: Llama
        - label: Other
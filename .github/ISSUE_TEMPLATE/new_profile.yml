type: issue
name: New Profile Request
description: Suggest a new prompt profile
title: "[PROFILE] "
labels: ["feature"]

body:
  - type: input
    attributes:
      label: Profile name
      placeholder: "e.g. data-engineer"
    validations:
      required: true

  - type: textarea
    attributes:
      label: What is this profile for?
    validations:
      required: true

  - type: input
    attributes:
      label: Which profile does this extend?
      placeholder: "e.g. universal.md"
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Which AIs did you test this with?
      options:
        - label: Claude
        - label: ChatGPT
        - label: Gemini
        - label: Mistral
        - label: Llama
        - label: Other

  - type: textarea
    attributes:
      label: Draft rules (optional)
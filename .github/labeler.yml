# This file tells the Auto Label workflow which label to apply to a PR.
# Labels are matched by: files changed OR branch name pattern.
# Labels are used by release-drafter to sort changes into release note sections.
# Add new labels here when you add new categories to release-drafter.yml.

# Applied for new profiles — branch must start with profile/
# Using head-branch only to avoid labeling profile edits as new features.
# Edits to existing profiles should use improvement/ branches — see CONTRIBUTING.md.
feature:
  - head-branch: ["^profile/"]

# Applied when fixing typos, outdated info, or broken formatting
fix:
  - head-branch: ["^fix/"]

# Applied when changing README, ROADMAP, CHANGELOG, or community docs
docs:
  - changed-files:
    - any-glob-to-any-file:
      - "README.md"
      - "ROADMAP.md"
      - "CHANGELOG.md"
      - ".github/CONTRIBUTING.md"
      - ".github/CODE_OF_CONDUCT.md"
      - ".github/SECURITY.md"

# Applied when adding or updating free-resources entries
free-resources:
  - changed-files:
    - any-glob-to-any-file:
      - "free-resources/**"

# Applied when improving an existing profile or config file
# Also covers all profiles/**/*.md changes — ensures profile edits on any branch
# get labeled improvement, not feature.
improvement:
  - changed-files:
    - any-glob-to-any-file:
      - "profiles/**/*.md"
      - ".coderabbit.yaml"
      - ".markdownlint.json"
      - ".cspell.json"
  - head-branch: ["^improvement/"]

# Applied when changing GitHub Actions workflows, scripts, or automation config
ci:
  - changed-files:
    - any-glob-to-any-file:
      - ".github/workflows/**"
      - ".github/scripts/**"
      - ".github/labeler.yml"
      - ".github/release-drafter.yml"

# Applied when adding translated versions of profiles
translation:
  - changed-files:
    - any-glob-to-any-file:
      - "profiles/lang/**"
  - head-branch: ["^translation/"]

# Applied manually by maintainers only — triggers a major version bump
# breaking: (intentionally no auto-rule — manual only)
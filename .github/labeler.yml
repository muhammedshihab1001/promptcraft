feature:
  - changed-files:
    - any-glob-to-any-file:
      - "profiles/**/*.md"
  - head-branch: ["^profile/"]

fix:
  - head-branch: ["^fix/"]

docs:
  - changed-files:
    - any-glob-to-any-file:
      - "README.md"
      - "ROADMAP.md"
      - "CHANGELOG.md"
      - ".github/CONTRIBUTING.md"
      - ".github/CODE_OF_CONDUCT.md"
      - ".github/SECURITY.md"

free-resources:
  - changed-files:
    - any-glob-to-any-file:
      - "free-resources/**"

improvement:
  - changed-files:
    - any-glob-to-any-file:
      - "profiles/universal.md"
      - ".coderabbit.yaml"
      - ".markdownlint.json"
      - ".cspell.json"

ci:
  - changed-files:
    - any-glob-to-any-file:
      - ".github/workflows/**"
      - ".github/labeler.yml"
      - ".github/release-drafter.yml"
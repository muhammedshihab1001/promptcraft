name: Validate Profiles

on:
  pull_request:
    paths:
      - "profiles/**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate profile headers
        shell: bash
        run: |
          FAILED=0

          while IFS= read -r -d '' file; do
            if [[ "$file" == "profiles/universal.md" ]]; then
              echo "Skipping base profile: $file"
              continue
            fi

            echo "Checking: $file"

            grep -q "^# Name:" "$file" || { echo "MISSING: '# Name:' in $file"; FAILED=1; }
            grep -q "^# Works with:" "$file" || { echo "MISSING: '# Works with:' in $file"; FAILED=1; }
            grep -q "^# Best for:" "$file" || { echo "MISSING: '# Best for:' in $file"; FAILED=1; }
            grep -q "^# Extends:" "$file" || { echo "MISSING: '# Extends:' in $file"; FAILED=1; }
            grep -q "^# Version:" "$file" || { echo "MISSING: '# Version:' in $file"; FAILED=1; }

            if grep -qP "\x{2014}" "$file"; then
              echo "FOUND em dash in $file - remove it"
              FAILED=1
            fi

            if grep -qP "[\x{2018}\x{2019}\x{201C}\x{201D}]" "$file"; then
              echo "FOUND smart quotes in $file - replace with plain quotes"
              FAILED=1
            fi

          done < <(find profiles -name "*.md" -print0)

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Profile validation failed. Fix the issues above."
            exit 1
          fi

          echo "All profiles valid."
# This workflow runs every time a PR touches a profile file.
# It checks that every profile has the required header fields
# and does not contain formatting violations like em dashes or smart quotes.
# It also checks that every profile is listed in README.md.
# If any check fails, the PR cannot be merged until it is fixed.

name: Validate Profiles

on:
  pull_request:
    # Only runs when files inside the profiles/ folder are changed
    paths:
      - "profiles/**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate profile headers
        shell: bash
        run: |
          FAILED=0

          while IFS= read -r -d '' file; do

            # Skip the base profile — it intentionally does not extend anything
            if [[ "$file" == "profiles/universal.md" ]]; then
              echo "Skipping base profile: $file"
              continue
            fi

            # Skip the image-gen README — it uses a different format
            if [[ "$file" == "profiles/image-gen/README.md" ]]; then
              echo "Skipping image-gen profile: $file"
              continue
            fi

            # Skip translation files — they live in profiles/lang/ and may use non-English headers
            if [[ "$file" == profiles/lang/* ]]; then
              echo "Skipping translation file: $file"
              continue
            fi

            echo "Checking: $file"

            # Check all five required header fields exist at the start of a line
            grep -q "^# Name:"       "$file" || { echo "MISSING: '# Name:' in $file";       FAILED=1; }
            grep -q "^# Works with:" "$file" || { echo "MISSING: '# Works with:' in $file"; FAILED=1; }
            grep -q "^# Best for:"   "$file" || { echo "MISSING: '# Best for:' in $file";   FAILED=1; }
            grep -q "^# Extends:"    "$file" || { echo "MISSING: '# Extends:' in $file";    FAILED=1; }
            grep -q "^# Version:"    "$file" || { echo "MISSING: '# Version:' in $file";    FAILED=1; }

            # Run the Python checker script for em dash, smart quote, empty value,
            # and Extends file existence checks.
            python3 .github/scripts/check_profile.py "$file"

            if [ $? -ne 0 ]; then
              FAILED=1
            fi

          done < <(find profiles -name "*.md" -print0)

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Profile validation failed. Fix the issues listed above before merging."
            exit 1
          fi

          echo "All profiles valid."

      - name: Check profiles listed in README
        shell: bash
        run: |
          FAILED=0

          while IFS= read -r -d '' file; do

            # Apply same skip list as header validation
            if [[ "$file" == "profiles/universal.md" ]]; then continue; fi
            if [[ "$file" == "profiles/image-gen/README.md" ]]; then continue; fi
            if [[ "$file" == profiles/lang/* ]]; then continue; fi

            # Check the file path appears somewhere in README.md
            if ! grep -qF "$file" README.md; then
              echo "MISSING from README profile index: $file"
              FAILED=1
            fi

          done < <(find profiles -name "*.md" -print0)

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Add missing profiles to the profile index table in README.md."
            exit 1
          fi

          echo "All profiles listed in README."
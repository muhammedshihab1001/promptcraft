# This workflow automatically marks issues, PRs and discussions as stale
# after 14 days of inactivity and closes them after 7 more days if there
# is still no activity.
# Maintainers can exempt items using the labels listed below.

name: Close Stale PRs, Issues and Discussions

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # --- Issues ---
          stale-issue-message: >
            This issue has had no activity for 14 days.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            Closing due to inactivity. Re-open if still relevant.

          # --- PRs ---
          stale-pr-message: >
            This PR has had no activity for 14 days.
            It will be closed in 7 days unless there is new activity.
          close-pr-message: >
            Closing due to inactivity. Re-open when ready to continue.

          # --- Discussions ---
          stale-discussion-message: >
            This discussion has had no activity for 30 days.
            It will be closed in 7 days unless there is new activity.
          close-discussion-message: >
            Closing due to inactivity. Feel free to re-open if still relevant.

          # --- Timings ---
          days-before-stale: 14
          days-before-close: 7
          days-before-discussion-stale: 30
          days-before-discussion-close: 7

          # --- Labels ---
          stale-issue-label: stale
          stale-pr-label: stale
          stale-discussion-label: stale

          # --- Exemptions ---
          exempt-issue-labels: "pinned,security,good-first-issue"
          exempt-pr-labels: "pinned,security"
          exempt-discussion-labels: "pinned,announcement"
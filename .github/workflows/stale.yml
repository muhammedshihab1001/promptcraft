name: Close Stale PRs and Issues

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          stale-issue-message: >
            This issue has had no activity for 14 days.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            Closing due to inactivity. Re-open if still relevant.

          stale-pr-message: >
            This PR has had no activity for 14 days.
            It will be closed in 7 days unless there is new activity.
          close-pr-message: >
            Closing due to inactivity. Re-open when ready to continue.

          days-before-stale: 14
          days-before-close: 7

          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,good-first-issue"
          exempt-pr-labels: "pinned,security"

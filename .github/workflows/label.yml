name: Auto Label PRs and Discussions

on:
  pull_request:
    types: [opened, synchronize, reopened]
  discussion:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  discussions: write

jobs:
  label-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  label-discussion:
    if: github.event_name == 'discussion'
    runs-on: ubuntu-latest
    steps:
      - name: Auto Label Discussion
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.discussion.title.toLowerCase();
            const discussionNodeId = context.payload.discussion.node_id;

            const labelMap = [
              { keyword: 'bug',      label: 'bug' },
              { keyword: 'help',     label: 'help wanted' },
              { keyword: 'feature',  label: 'enhancement' },
              { keyword: 'question', label: 'question' },
            ];

            const matched = labelMap.find(l => title.includes(l.keyword));
            if (!matched) return;

            // Step 1: Get label node ID via GraphQL
            const labelResult = await github.graphql(`
              query GetLabelId($owner: String!, $repo: String!, $name: String!) {
                repository(owner: $owner, name: $repo) {
                  label(name: $name) {
                    id
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: matched.label
            });

            const labelId = labelResult?.repository?.label?.id;
            if (!labelId) {
              console.log(`Label "${matched.label}" not found in repo`);
              return;
            }

            // Step 2: Apply label to discussion using GraphQL
            await github.graphql(`
              mutation AddLabel($labelableId: ID!, $labelIds: [ID!]!) {
                addLabelsToLabelable(input: {
                  labelableId: $labelableId,
                  labelIds: $labelIds
                }) {
                  clientMutationId
                }
              }
            `, {
              labelableId: discussionNodeId,
              labelIds: [labelId]
            });

            console.log(`Applied label "${matched.label}" to discussion`);
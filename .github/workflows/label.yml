# This workflow automatically applies labels to PRs based on:
# - Which files were changed (defined in .github/labeler.yml)
# - Which branch name pattern was used
# Labels are used by release-drafter to categorize changes in release notes.

name: Auto Label PRs

on:
  pull_request:
    # Re-run labeling whenever the PR is opened, updated, or reopened
    types: [opened, synchronize, reopened]

# These permissions are required — read the code, write labels to the PR
permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      # actions/labeler@v6 is the latest version as of April 2025
      # Configuration is in .github/labeler.yml
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
# This workflow automatically applies labels to PRs based on:
# - Which files were changed (defined in .github/labeler.yml)
# - Which branch name pattern was used
# Labels are used by release-drafter to categorize changes in release notes.
# Also auto-labels discussions based on title keywords.

name: Auto Label PRs and Discussions

on:
  pull_request:
    types: [opened, synchronize, reopened]
  discussion:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  discussions: write

jobs:
  label-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  label-discussion:
    if: github.event_name == 'discussion'
    runs-on: ubuntu-latest
    steps:
      - name: Auto Label Discussion
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.discussion.title.toLowerCase();
            const discussionNumber = context.payload.discussion.number;

            const labelMap = [
              { keyword: 'bug',      label: 'bug' },
              { keyword: 'help',     label: 'help wanted' },
              { keyword: 'feature',  label: 'enhancement' },
              { keyword: 'question', label: 'question' },
            ];

            const matched = labelMap.find(l => title.includes(l.keyword));
            if (!matched) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: discussionNumber,
              labels: [matched.label]
            });
# This workflow checks spelling in all markdown files.
# It runs on every PR and on every push to main.
# The wordlist (custom terms, tool names, proper nouns) is in .cspell.json.
# If a word is flagged incorrectly, add it to the "words" list in .cspell.json.

name: Spell Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # cspell-action@v6 is the latest stable version
      # Only checks files changed in the PR to keep runs fast
      - name: Check spelling
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: "**/*.md"
          config: ".cspell.json"
          # Only check files that changed in this PR, not the entire repo every time
          incremental_files_only: true
# This file controls how release notes are automatically drafted.
# Every time a PR is merged to main, release-drafter updates a draft release.
# When ready to publish, go to GitHub Releases and publish the draft manually.
#
# How versioning works:
# - A PR labelled "feature" bumps the minor version (0.1.0 → 0.2.0)
# - A PR labelled "fix", "improvement", "docs", "free-resources", or "ci" bumps patch (0.1.0 → 0.1.1)
# - A PR labelled "breaking" bumps the major version (0.1.0 → 1.0.0) — add this label manually

name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

# These sections appear in the release notes, grouped by label
categories:
  - title: "New Profiles"
    labels:
      - "feature"
  - title: "Improvements"
    labels:
      - "improvement"
  - title: "Bug Fixes"
    labels:
      - "fix"
  - title: "Documentation"
    labels:
      - "docs"
  - title: "Free Resources"
    labels:
      - "free-resources"
  - title: "Translations"
    labels:
      - "translation"
  - title: "CI / Automation"
    labels:
      - "ci"

# Which label controls which version number gets bumped
version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "feature"
  patch:
    labels:
      - "fix"
      - "improvement"
      - "docs"
      - "free-resources"
      - "translation"
      - "ci"
  default: patch

# Template for the release notes body
template: |
  ## What changed in $RESOLVED_VERSION

  $CHANGES

  {% if CHANGES == "" %}
  - No significant changes
  {% endif %}

  **Full changelog:** $PREVIOUS_TAG...v$RESOLVED_VERSION
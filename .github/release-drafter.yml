# This file controls how release notes are automatically drafted.
# Every time a PR is merged to main, release-drafter updates a draft release.
# When ready to publish, go to GitHub Releases and publish the draft manually.
#
# How versioning works:
# - All changes (new profiles, fixes, improvements, docs, ci) bump patch (0.1.x)
# - A PR labelled "breaking" bumps the major version (0.1.0 → 1.0.0) — add manually
# - Minor version bumps (0.1.0 → 0.2.0) are done manually at ROADMAP milestones

name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

# These sections appear in the release notes, grouped by label
categories:
  - title: "New Profiles"
    labels:
      - "feature"
  - title: "Improvements"
    labels:
      - "improvement"
  - title: "Bug Fixes"
    labels:
      - "fix"
  - title: "Documentation"
    labels:
      - "docs"
  - title: "Free Resources"
    labels:
      - "free-resources"
  - title: "Translations"
    labels:
      - "translation"
  - title: "CI / Automation"
    labels:
      - "ci"

# All labels trigger patch bumps.
# Minor bumps are done manually at ROADMAP milestones.
# Major bumps require the "breaking" label added manually by a maintainer.
version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels: []
  patch:
    labels:
      - "feature"
      - "fix"
      - "improvement"
      - "docs"
      - "free-resources"
      - "translation"
      - "ci"
  default: patch

# Template for the release notes body
template: |
  ## What changed in $RESOLVED_VERSION

  $CHANGES

  **Full changelog:** $PREVIOUS_TAG...v$RESOLVED_VERSION